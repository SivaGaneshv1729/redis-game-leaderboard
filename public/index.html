<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #09090b;
      --neon-pink: #f0f;
      --neon-green: #39ff14;
      --neon-blue: #0ff;
      --text-main: #e0e0e0;
      --panel-bg: rgba(9, 9, 11, 0.9);
      --grid-color: rgba(0, 255, 255, 0.05);
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: 'Fira Code', monospace;
      background-color: var(--bg-dark);
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 30px 30px;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 2rem;
      overflow-x: hidden;
      position: relative;
    }

    /* Scanline effect overlay */
    body::after {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    h1 {
      font-size: 2.5rem;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 
        2px 0 var(--neon-pink), 
        -2px 0 var(--neon-blue);
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--neon-pink);
      padding-bottom: 0.5rem;
      position: relative;
      animation: glitch 3s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
      5% { text-shadow: -2px 0 var(--neon-pink), 2px 0 var(--neon-blue); }
      10% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
      100% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-blue); }
    }

    .container {
      display: flex;
      gap: 2rem;
      width: 95%;
      max-width: 1400px;
      z-index: 1;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--neon-blue);
      box-shadow: 4px 4px 0px var(--neon-pink);
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      /* Chamfered corners trick */
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      border: 2px solid var(--neon-blue);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      pointer-events: none;
    }

    .panel h2 {
      font-size: 1.2rem;
      color: var(--neon-green);
      text-transform: uppercase;
      margin-top: 0;
      border-bottom: 1px dashed var(--neon-green);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }

    /* Leaderboard Styles */
    .leaderboard-list {
      list-style: none;
      padding: 0;
      margin: 0;
      overflow-y: auto;
      max-height: 500px;
      padding-right: 10px;
    }

    .leaderboard-list::-webkit-scrollbar {
      width: 8px;
    }
    .leaderboard-list::-webkit-scrollbar-track {
      background: rgba(0, 255, 255, 0.1);
    }
    .leaderboard-list::-webkit-scrollbar-thumb {
      background: var(--neon-pink);
    }

    .leaderboard-item {
      display: grid;
      grid-template-columns: 40px 1fr auto;
      align-items: center;
      padding: 0.75rem 1rem;
      margin-bottom: 0.5rem;
      background: rgba(0, 255, 255, 0.05);
      border-left: 4px solid var(--neon-blue);
      transition: all 0.2s;
    }

    .leaderboard-item:hover {
      background: rgba(255, 0, 255, 0.1);
      border-left-color: var(--neon-pink);
      transform: translateX(4px);
    }

    .rank {
      font-weight: 700;
      color: var(--neon-pink);
    }

    .player {
      font-weight: 600;
      color: #fff;
    }

    .score {
      font-weight: 700;
      color: var(--neon-green);
    }

    /* Events Styles */
    .events-container {
      flex: 1;
      overflow-y: auto;
      max-height: 500px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding-right: 10px;
    }

    .events-container::-webkit-scrollbar {
      width: 8px;
    }
    .events-container::-webkit-scrollbar-track {
      background: rgba(0, 255, 255, 0.1);
    }
    .events-container::-webkit-scrollbar-thumb {
      background: var(--neon-blue);
    }

    .event-item {
      padding: 0.75rem 1rem;
      background: rgba(57, 255, 20, 0.05);
      border: 1px solid var(--neon-green);
      font-size: 0.95rem;
      position: relative;
    }
    
    .event-item::before {
      content: 'SYS.LOG > ';
      color: var(--neon-pink);
    }

    /* Action Buttons */
    .actions {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
      z-index: 1;
    }

    button {
      background: transparent;
      color: var(--neon-green);
      border: 2px solid var(--neon-green);
      padding: 1rem 2.5rem;
      font-family: 'Fira Code', monospace;
      font-weight: 700;
      font-size: 1rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 4px 4px 0px rgba(57, 255, 20, 0.3);
    }

    button:hover {
      background: var(--neon-green);
      color: #000;
      box-shadow: 6px 6px 0px rgba(57, 255, 20, 0.5);
      transform: translate(-2px, -2px);
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px transparent;
    }
  </style>
</head>
<body>

  <h1>SYS.ROOT // NETWORK_LEADERBOARD</h1>

  <div class="container">
    <!-- Leaderboard Panel -->
    <div class="panel">
      <h2>>> USER_RANKINGS</h2>
      <ul class="leaderboard-list" id="leaderboard">
        <div style="text-align:center; padding: 2rem; color: rgba(255,255,255,0.5);">[FETCHING_DATA...]</div>
      </ul>
    </div>

    <!-- Live Events Panel -->
    <div class="panel">
      <h2>>> PACKET_STREAM</h2>
      <div class="events-container" id="events-log">
        <div style="text-align:center; padding: 2rem; color: rgba(255,255,255,0.5);" id="waiting-msg">[AWAITING_SOCKETS...]</div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button onclick="simulateSubmission()">EXECUTE_PAYLOAD()</button>
  </div>

  <script>
    // 1. Fetch initial leaderboard
    async function fetchLeaderboard() {
      try {
        const res = await fetch('/api/leaderboard/top/10');
        const data = await res.json();
        renderLeaderboard(data);
      } catch (err) {
        console.error('Failed to fetch leaderboard', err);
      }
    }

    function renderLeaderboard(data) {
      const list = document.getElementById('leaderboard');
      list.innerHTML = '';
      data.forEach((p, idx) => {
        const li = document.createElement('li');
        li.className = 'leaderboard-item';
        li.innerHTML = `
          <span class="rank">[${p.rank}]</span>
          <span class="player">${p.playerId}</span>
          <span class="score">${p.score.toLocaleString()}</span>
        `;
        list.appendChild(li);
      });
    }

    // 2. Connect to Server-Sent Events (SSE)
    const evtSource = new EventSource('/api/events');
    const eventsLog = document.getElementById('events-log');
    
    evtSource.addEventListener('leaderboard_updated', (e) => {
      const data = JSON.parse(e.data);
      
      const waiting = document.getElementById('waiting-msg');
      if (waiting) waiting.remove();

      const eventDiv = document.createElement('div');
      eventDiv.className = 'event-item';
      eventDiv.innerHTML = `<span style="color:var(--neon-blue)">${data.playerId}</span> injected data. Value: <span style="color:var(--neon-green)">${data.newScore}</span>`;
      
      eventsLog.prepend(eventDiv);
      
      // Refresh leaderboard when a score updates
      fetchLeaderboard();
    });

    evtSource.onerror = (err) => {
      console.error("SSE Error:", err);
    };

    // 3. Simulate Gameplay
    async function simulateSubmission() {
      const players = ['ZeroCool', 'AcidBurn', 'CrashOverride', 'CerealKiller', 'LordNikon', 'PhantomPhreak'];
      const randomPlayer = players[Math.floor(Math.random() * players.length)];
      const points = Math.floor(Math.random() * 256) + 32;

      try {
        await fetch('/api/leaderboard/scores', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ playerId: randomPlayer, points })
        });
      } catch (err) {
        console.error(err);
      }
    }

    // Initialize
    fetchLeaderboard();
  </script>
</body>
</html>
